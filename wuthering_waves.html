<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wuthering Waves – Character Tracker</title>
  <link rel="stylesheet" href="css/wuwa/style.css">
</head>

<body>
  <div class="container">
    <h1 class="page-title">Wuthering Waves – Character Tracker</h1>
    <p class="page-subtitle">Resonance icons en weapon toggle werken alleen als Owned aan staat.</p>

    <input
      id="searchInput"
      class="search-input"
      type="text"
      placeholder="Zoek character..."
      autocomplete="off"
    >

    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="five">5★</button>
      <button class="tab-btn" data-tab="four">4★</button>
      <button class="tab-btn" data-tab="standard">Standard</button>
      <button class="tab-btn" data-tab="collab">Collab</button>
      <button class="tab-btn" data-tab="owned">Owned</button>
      <button class="tab-btn" data-tab="notowned">Not Owned</button>
    </div>

    <div id="list" class="grid" aria-label="Character kaarten"></div>
  </div>

  <script src="js/wuwa/characters.js?v=3"></script>

  <script>
    const KEY = "ww_tracker_final_v2";
    const PLACEHOLDER = "assets/wuwa/resonance/placeholder.jpg";

    const WEAPON_PLACEHOLDER =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160">
          <rect width="160" height="160" rx="24" fill="#0b1324"/>
          <rect x="7" y="7" width="146" height="146" rx="19"
                fill="none" stroke="#263756" stroke-width="5"/>
          <text x="80" y="87" text-anchor="middle"
                font-family="Arial, sans-serif" font-size="22"
                font-weight="700" fill="#8fa3c8">Weapon</text>
        </svg>
      `);

    let ACTIVE_TAB = "all";
    let SEARCH_QUERY = "";

    function defaultChar(){
      return {
        owned:false,
        level:1,
        chain:0,
        weaponExtra:false,
        skills:{ basic:1, skill:1, forte:1, liberation:1, outro:1 }
      };
    }

    function load(){
      const s = localStorage.getItem(KEY);
      const d = s ? JSON.parse(s) : {};
      CHARACTERS.forEach(c=>{
        if(!d[c.id]) d[c.id] = defaultChar();
      });
      localStorage.setItem(KEY, JSON.stringify(d));
      return d;
    }

    function save(d){
      localStorage.setItem(KEY, JSON.stringify(d));
    }

    function clamp(v,min,max){
      v = Number(v);
      return isNaN(v) ? min : Math.max(min, Math.min(max, v));
    }

    function iconError(img){
      img.onerror = null;
      img.src = PLACEHOLDER;
    }

    function normalizeWeaponSources(value){
      if(Array.isArray(value)){
        return value.filter(Boolean);
      }

      return value ? [value] : [];
    }

    function weaponSourcesAttribute(sources){
      return encodeURIComponent(
        JSON.stringify(normalizeWeaponSources(sources))
      );
    }

    function weaponError(img){
      let sources = [];

      try{
        sources = JSON.parse(
          decodeURIComponent(img.dataset.sources || "%5B%5D")
        );
      }catch(error){
        console.error("Weapon-paden konden niet worden gelezen:", error);
      }

      let nextIndex = Number(img.dataset.sourceIndex || 1);

      if(nextIndex < sources.length){
        img.dataset.sourceIndex = String(nextIndex + 1);
        img.src = sources[nextIndex];
        return;
      }

      console.error(
        "Geen weapon-afbeelding gevonden. Geprobeerd:",
        sources
      );

      img.onerror = null;
      img.src = WEAPON_PLACEHOLDER;
      img.classList.add("asset-missing");
    }

    function passesTab(c, d){
      if(ACTIVE_TAB === "five" && c.rarity !== "5★") return false;
      if(ACTIVE_TAB === "four" && c.rarity !== "4★") return false;
      if(ACTIVE_TAB === "standard" && c.standard !== true) return false;
      if(ACTIVE_TAB === "collab" && c.collab !== true) return false;
      if(ACTIVE_TAB === "owned" && d.owned !== true) return false;
      if(ACTIVE_TAB === "notowned" && d.owned !== false) return false;
      return true;
    }

    function passesSearch(c){
      if(!SEARCH_QUERY) return true;

      const text = `
        ${c.id}
        ${c.name}
        ${c.rarity}
        ${c.standard ? "standard" : ""}
        ${c.collab ? "collab" : ""}
      `.toLowerCase();

      return text.includes(SEARCH_QUERY);
    }

    function render(){
      const data = load();
      const list = document.getElementById("list");
      list.innerHTML = "";

      CHARACTERS.forEach(c=>{
        const d = data[c.id];
        const owned = d.owned;

        if(!passesTab(c, d)) return;
        if(!passesSearch(c)) return;

        const hasWeapons = Array.isArray(c.weapons) && c.weapons.length >= 1;
        const baseWeaponSources = hasWeapons
          ? normalizeWeaponSources(c.weapons[0])
          : [];
        const extraWeaponSources = c.weapons[1]
          ? normalizeWeaponSources(c.weapons[1])
          : [];

        const card = document.createElement("div");
        card.className = `
          tracker-card
          ${owned ? "is-owned" : "not-owned"}
          rarity-${c.rarity.replace("★", "star")}
          ${c.collab ? "is-collab" : ""}
        `;

        card.innerHTML = `
          <div class="row-main">
            <div class="row-char">
              <img src="${c.image}" class="char-img ${owned ? "" : "dim"}" alt="${c.name}" onerror="this.style.display='none'">

              <div class="char-text">
                <div class="meta meta-top">
                  <span class="pill">${c.rarity}</span>
                  ${c.standard ? `<span class="pill pill-standard">Standard</span>` : ``}
                  ${c.collab ? `<span class="pill pill-collab">Collab</span>` : ``}
                </div>

                <div class="char-name">${c.name}</div>

                <label class="owned-inline owned-under-name">
                  <input type="checkbox" ${owned ? "checked" : ""} onchange="setOwned('${c.id}', this.checked)">
                  <span>Owned</span>
                </label>
              </div>
            </div>

            <div class="row-col row-weapons">
              <div class="mini-box weapon-box ${hasWeapons ? "" : "empty"}">
                ${baseWeaponSources.length ? `
                  <img
                    src="${baseWeaponSources[0]}"
                    data-sources="${weaponSourcesAttribute(baseWeaponSources)}"
                    data-source-index="1"
                    class="weapon-icon base"
                    title="Weapon type"
                    alt="${c.name} weapon type"
                    onerror="weaponError(this)"
                  >

                  ${extraWeaponSources.length ? `
                    <img
                      src="${extraWeaponSources[0]}"
                      data-sources="${weaponSourcesAttribute(extraWeaponSources)}"
                      data-source-index="1"
                      class="weapon-icon extra ${owned ? "clickable" : "disabled"} ${d.weaponExtra ? "active" : ""}"
                      title="Eigen weapon (toggle)"
                      alt="${c.name} eigen weapon"
                      ${owned ? `onclick="toggleWeaponExtra('${c.id}')"` : ``}
                      onerror="weaponError(this)"
                    >
                  ` : ``}
                ` : `<span class="weapon-empty">No weapon</span>`}
              </div>
            </div>

            <div class="row-col row-resonance">
              ${c.icons.map((icon,i)=>`
                <img
                  src="${icon}"
                  class="chain-icon ${d.chain>=i+1 ? "active" : ""} ${owned ? "clickable" : "disabled"}"
                  ${owned ? `onclick="setChain('${c.id}',${i+1})"` : "" }
                  onerror="iconError(this)"
                  alt="Resonance ${i+1}">
              `).join("")}
            </div>
          </div>

          <div class="divider"></div>

          <div class="skills">
            ${Object.entries(d.skills).map(([k,v])=>`
              <div class="skill-row">
                <span class="skill-name">${k}</span>
                <input class="skill-input" value="${v}" oninput="setSkill('${c.id}','${k}', this.value)">
              </div>
            `).join("")}
          </div>
        `;

        list.appendChild(card);
      });
    }

    function setOwned(id,val){
      const d = load();
      d[id].owned = val;
      if(!val){
        d[id].chain = 0;
        d[id].weaponExtra = false;
      }
      save(d);
      render();
    }

    function setChain(id,val){
      const d = load();
      d[id].chain = (d[id].chain === val) ? 0 : val;
      save(d);
      render();
    }

    function toggleWeaponExtra(id){
      const d = load();
      d[id].weaponExtra = !d[id].weaponExtra;
      save(d);
      render();
    }

    function setLevel(id,val){
      const d = load();
      d[id].level = clamp(val, 1, 90);
      save(d);
    }

    function setSkill(id,skill,val){
      const d = load();
      d[id].skills[skill] = clamp(val, 1, 10);
      save(d);
    }

    document.getElementById("tabs").addEventListener("click", (e)=>{
      const btn = e.target.closest(".tab-btn");
      if(!btn) return;

      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");

      ACTIVE_TAB = btn.dataset.tab;
      render();
    });

    document.getElementById("searchInput").addEventListener("input", (e)=>{
      SEARCH_QUERY = e.target.value.trim().toLowerCase();
      render();
    });

    render();
  </script>
</body>
</html>
